<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Husna</title>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fdf0f8;
      font-family: Georgia, serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
    @keyframes pulse   { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    @keyframes drift   { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(-80px) rotate(25deg);opacity:0} }
    @keyframes shimmer { 0%,100%{opacity:0.5} 50%{opacity:1} }
    @keyframes spin    { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes fadeIn  { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .card {
      background: linear-gradient(160deg, #fff0f8 0%, #fce8f3 40%, #f5e6ff 100%);
      border-radius: 28px;
      border: 1.5px solid #f5a7c7;
      padding: 36px 28px 32px;
      position: relative;
      overflow: hidden;
      max-width: 420px;
      width: 100%;
      animation: fadeIn 0.8s ease;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 22px;
      border: 0.8px dashed #f9cfe0;
      pointer-events: none;
    }

    .title {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      color: #D4537E;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .name-pill {
      display: inline-block;
      background: #FBEAF0;
      border: 1px solid #f5a7c7;
      border-radius: 30px;
      padding: 6px 32px;
      font-size: 26px;
      font-weight: 700;
      color: #993556;
      letter-spacing: 5px;
      margin: 6px 0 20px;
    }
    .top-center { text-align: center; }

    .photo-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 18px;
      animation: float 3.5s ease-in-out infinite;
    }
    .photo-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 3px solid #f5a7c7;
      animation: spin 12s linear infinite;
    }
    .photo-ring::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1.5px dashed #CECBF6;
    }
    .photo-img {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #fff;
      display: block;
      position: relative;
      z-index: 2;
    }
    .heart-big {
      position: absolute;
      bottom: -8px;
      right: -4px;
      z-index: 3;
      animation: pulse 2s ease-in-out infinite;
    }

    .petal { position: absolute; pointer-events: none; animation: drift linear infinite; }
    .sparkle { position: absolute; animation: shimmer 2.5s ease-in-out infinite; }

    .message {
      text-align: center;
      color: #993556;
      font-size: 15px;
      line-height: 1.8;
      margin: 8px 0 14px;
    }
    .message strong {
      display: block;
      font-size: 18px;
      color: #D4537E;
      margin-top: 8px;
    }

    .hearts-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 10px 0 0;
    }

    .bottom-flowers {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 16px;
    }
    .flower-stem {
      width: 2px;
      height: 28px;
      background: #5DCAA5;
      margin: 0 auto;
      border-radius: 2px;
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Sparkles -->
  <div class="sparkle" style="top:40px;left:55px;animation-delay:0s">
    <svg width="18" height="18" viewBox="0 0 18 18"><line x1="9" y1="1" x2="9" y2="17" stroke="#FAC775" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="9" x2="17" y2="9" stroke="#FAC775" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="3" x2="15" y2="15" stroke="#FAC775" stroke-width="1.5" stroke-linecap="round"/><line x1="15" y1="3" x2="3" y2="15" stroke="#FAC775" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
  <div class="sparkle" style="top:40px;right:55px;animation-delay:1s">
    <svg width="16" height="16" viewBox="0 0 18 18"><line x1="9" y1="1" x2="9" y2="17" stroke="#FAC775" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="9" x2="17" y2="9" stroke="#FAC775" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="3" x2="15" y2="15" stroke="#FAC775" stroke-width="1.5" stroke-linecap="round"/><line x1="15" y1="3" x2="3" y2="15" stroke="#FAC775" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
  <div class="sparkle" style="bottom:80px;left:40px;animation-delay:1.5s">
    <svg width="13" height="13" viewBox="0 0 18 18"><line x1="9" y1="1" x2="9" y2="17" stroke="#CECBF6" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="9" x2="17" y2="9" stroke="#CECBF6" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="3" x2="15" y2="15" stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/><line x1="15" y1="3" x2="3" y2="15" stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>
  <div class="sparkle" style="bottom:80px;right:40px;animation-delay:0.7s">
    <svg width="13" height="13" viewBox="0 0 18 18"><line x1="9" y1="1" x2="9" y2="17" stroke="#CECBF6" stroke-width="2" stroke-linecap="round"/><line x1="1" y1="9" x2="17" y2="9" stroke="#CECBF6" stroke-width="2" stroke-linecap="round"/><line x1="3" y1="3" x2="15" y2="15" stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/><line x1="15" y1="3" x2="3" y2="15" stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/></svg>
  </div>

  <!-- Floating petals -->
  <div class="petal" style="top:60px;left:30px;animation-duration:4s;animation-delay:0s">
    <svg width="14" height="14" viewBox="0 0 24 24"><path d="M12 2C12 2 4 6 4 12C4 18 12 22 12 22C12 22 20 18 20 12C20 6 12 2 12 2Z" fill="#f5a7c7" opacity="0.7"/></svg>
  </div>
  <div class="petal" style="top:80px;right:35px;animation-duration:5s;animation-delay:1.2s">
    <svg width="12" height="12" viewBox="0 0 24 24"><path d="M12 2C12 2 4 6 4 12C4 18 12 22 12 22C12 22 20 18 20 12C20 6 12 2 12 2Z" fill="#CECBF6" opacity="0.7"/></svg>

  <div class="petal" style="top:200px;left:20px;animation-duration:4.5s;animation-delay:2s">

  </div>
  <div class="petal" style="top:180px;right:22px;animation-duration:6s;animation-delay:0.5s">
    <svg width="11" height="11" viewBox="0 0 24 24"><path d="M12 2C12 2 4 6 4 12C4 18 12 22 12 22C12 22 20 18 20 12C20 6 12 2 12 2Z" fill="#B5D4F4" opacity="0.6"/></svg>
  </div>

  <!-- Title & Name -->
  <div class="top-center">
    <div class="title">Happy Birthday</div>
    <div><span class="name-pill">Husna</span></div>
  </div>

  <!-- Photo -->
  <div class="photo-wrap">
    <div class="photo-ring"></div>
    <img class="photo-img" src="https://i.ibb.co/JjCSTDLN/Husna.jpg" alt="Husna" crossorigin="anonymous" />
    <div class="heart-big">
      <svg width="42" height="42" viewBox="0 0 44 44">
        <path d="M22 38C22 38 4 26 4 14C4 8 9 4 14 4C17 4 20 6 22 9C24 6 27 4 30 4C35 4 40 8 40 14C40 26 22 38 22 38Z" fill="#f5a7c7" stroke="#D4537E" stroke-width="1.5"/>
        <path d="M22 34C22 34 8 24 8 15C8 11 11 8 15 8C17.5 8 19.5 9.5 22 12C24.5 9.5 26.5 8 29 8C33 8 36 11 36 15C36 24 22 34 22 34Z" fill="#ed93b1"/>
      </svg>
    </div>
  </div>

  <!-- Message -->
  <div class="message">
    On your special day, the world smiles brighter<br>
    because <em>you</em> are in it.<br>
    Every moment with you is a treasure,<br>
    every smile of yours a gift.<br>
    <strong>You are so loved, Husna. ♡</strong>
  </div>

  <!-- Hearts row -->
  <div class="hearts-row">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 21C12 21 2 14 2 7C2 4 4.5 2 7 2C9 2 11 3 12 5C13 3 15 2 17 2C19.5 2 22 4 22 7C22 14 12 21 12 21Z" fill="#f5a7c7"/></svg>
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 21C12 21 2 14 2 7C2 4 4.5 2 7 2C9 2 11 3 12 5C13 3 15 2 17 2C19.5 2 22 4 22 7C22 14 12 21 12 21Z" fill="#CECBF6"/></svg>
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 21C12 21 2 14 2 7C2 4 4.5 2 7 2C9 2 11 3 12 5C13 3 15 2 17 2C19.5 2 22 4 22 7C22 14 12 21 12 21Z" fill="#B5D4F4"/></svg>
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 21C12 21 2 14 2 7C2 4 4.5 2 7 2C9 2 11 3 12 5C13 3 15 2 17 2C19.5 2 22 4 22 7C22 14 12 21 12 21Z" fill="#f0997b"/></svg>
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 21C12 21 2 14 2 7C2 4 4.5 2 7 2C9 2 11 3 12 5C13 3 15 2 17 2C19.5 2 22 4 22 7C22 14 12 21 12 21Z" fill="#f5a7c7"/></svg>
  </div>

  <!-- Bottom flowers -->
  <div class="bottom-flowers">
    <div>
      <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="12" fill="#f7b3cc" opacity="0.6"/><circle cx="20" cy="10" r="9" fill="#ed93b1" opacity="0.8"/><circle cx="28" cy="26" r="9" fill="#ed93b1" opacity="0.8"/><circle cx="12" cy="26" r="9" fill="#ed93b1" opacity="0.8"/><circle cx="20" cy="20" r="6" fill="#D4537E"/><circle cx="20" cy="20" r="3" fill="#993556"/></svg>
      <div class="flower-stem"></div>
    </div>
    <div>
      <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="12" fill="#F5C4B3" opacity="0.6"/><circle cx="20" cy="10" r="9" fill="#f0997b" opacity="0.8"/><circle cx="28" cy="26" r="9" fill="#f0997b" opacity="0.8"/><circle cx="12" cy="26" r="9" fill="#f0997b" opacity="0.8"/><circle cx="20" cy="20" r="6" fill="#D85A30"/><circle cx="20" cy="20" r="3" fill="#993C1D"/></svg>

    <div>
      <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="12" fill="#CECBF6" opacity="0.6"/><circle cx="20" cy="10" r="9" fill="#AFA9EC" opacity="0.8"/><circle cx="28" cy="26" r="9" fill="#AFA9EC" opacity="0.8"/><circle cx="12" cy="26" r="9" fill="#AFA9EC" opacity="0.8"/><circle cx="20" cy="20" r="6" fill="#7F77DD"/><circle cx="20" cy="20" r="3" fill="#534AB7"/></svg>
      <div class="flower-stem"></div>
    </div>
    <div>
      <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="12" fill="#f7b3cc" opacity="0.6"/><circle cx="20" cy="10" r="9" fill="#ed93b1" opacity="0.8"/><circle cx="28" cy="26" r="9" fill="#ed93b1" opacity="0.8"/><circle cx="12" cy="26" r="9" fill="#ed93b1" opacity="0.8"/><circle cx="20" cy="20" r="6" fill="#D4537E"/><circle cx="20" cy="20" r="3" fill="#993556"/></svg>
      <div class="flower-stem"></div>
    </div>
    <div>
      <svg width="40" height="40" viewBox="0 0 40 40"><circle cx="20" cy="20" r="12" fill="#B5D4F4" opacity="0.6"/><circle cx="20" cy="10" r="9" fill="#85B7EB" opacity="0.8"/><circle cx="28" cy="26" r="9" fill="#85B7EB" opacity="0.8"/><circle cx="12" cy="26" r="9" fill="#85B7EB" opacity="0.8"/><circle cx="20" cy="20" r="6" fill="#378ADD"/><circle cx="20" cy="20" r="3" fill="#185FA5"/></svg>

    </div>
  </div>

</div>
</body>
